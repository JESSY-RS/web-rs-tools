<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1-100 Uniform Simulator</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --primary-color: #bb86fc;
            --magenta-color: #ff00ff;
            --secondary-color: #00ffff;
            --border-color: #333;
            --cell-bg: #252525;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            background: var(--container-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        h2 { color: var(--primary-color); margin-top: 0; }

        .controls {
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            background-color: var(--primary-color);
            color: #000;
            border: none;
            border-radius: 6px;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.8; }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-box {
            background: var(--cell-bg);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .stat-box span {
            display: block;
            font-size: 24px;
            color: var(--secondary-color);
            font-weight: bold;
        }

        /* グラフエリア */
        .chart-container {
            position: relative;
            height: 300px;
            margin-bottom: 30px;
            background: rgba(255,255,255,0.02);
            border-radius: 8px;
            padding: 10px;
        }

        /* グリッドエリア */
        .grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 4px;
            margin-top: 10px;
        }

        .cell {
            height: 45px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            background: var(--cell-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            transition: transform 0.1s;
        }

        .cell .num { font-weight: bold; opacity: 0.6; }
        .cell .count { font-size: 14px; color: var(--secondary-color); }

        /* 出現回数による強調（ボーダーのみ） */
        .has-data { border-color: var(--magenta-color); }
        .high-freq { background-color: rgba(187, 134, 252, 0.2); }
    </style>
</head>
<body>

<div class="container">
    <h2>1-100 均等確率シミュレーター</h2>
    
    <div class="controls">
        <button onclick="runSimulation()">100回試行を実行</button>
        <p style="font-size: 0.9em; opacity: 0.7;">ボタンを押すたびに新しい100件の結果を生成します。</p>
    </div>

    <div class="stats">
        <div class="stat-box">平均値 <span id="mean">-</span></div>
        <div class="stat-box">最小値 <span id="min">-</span></div>
        <div class="stat-box">最大値 <span id="max">-</span></div>
    </div>

    <div class="chart-container">
        <canvas id="resultChart"></canvas>
    </div>

    <div id="grid" class="grid">
        </div>
</div>

<script>
let myChart = null;

function runSimulation() {
    const trials = 100;
    const results = [];
    const counts = new Array(101).fill(0);

    for (let i = 0; i < trials; i++) {
        const val = Math.floor(Math.random() * 100) + 1;
        results.push(val);
        counts[val]++;
    }

    // 統計更新
    const sum = results.reduce((a, b) => a + b, 0);
    document.getElementById('mean').innerText = (sum / trials).toFixed(1);
    document.getElementById('min').innerText = Math.min(...results);
    document.getElementById('max').innerText = Math.max(...results);

    updateGrid(counts);
    updateChart(counts);
}

function updateGrid(counts) {
    const gridEl = document.getElementById('grid');
    gridEl.innerHTML = '';
    for (let i = 1; i <= 100; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        const count = counts[i];
        
        if (count > 0) cell.classList.add('has-data');
        if (count >= 3) cell.classList.add('high-freq');

        cell.innerHTML = `<span class="num">${i}</span><span class="count">${count > 0 ? count : ''}</span>`;
        gridEl.appendChild(cell);
    }
}

function updateChart(counts) {
    const ctx = document.getElementById('resultChart').getContext('2d');
    const labels = Array.from({length: 100}, (_, i) => i + 1);
    const dataValues = counts.slice(1);

    if (myChart) {
        myChart.destroy();
    }

    myChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: '出現回数',
                data: dataValues,
                backgroundColor: '#bb86fc',
                borderColor: '#bb86fc',
                borderWidth: 1,
                barPercentage: 0.8
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: { color: '#aaa', stepSize: 1 },
                    grid: { color: '#333' }
                },
                x: {
                    ticks: { color: '#888', maxRotation: 0, autoSkip: true, maxTicksLimit: 20 },
                    grid: { display: false }
                }
            },
            plugins: {
                legend: { display: false }
            }
        }
    });
}

// 初回実行
window.onload = runSimulation;
</script>

</body>
</html>
