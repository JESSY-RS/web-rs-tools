<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>フレンドコード一覧</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-top: 0; /* ←ここを変更: 上部の余白を0にしました */
            margin-bottom: 20px;
            font-size: 1.5rem;
        }
        .friend-card {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        .friend-card:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .friend-name {
            font-weight: bold;
            margin-bottom: 8px;
            display: block;
            color: #555;
            font-size: 0.95rem;
        }
        .copy-group {
            display: flex;
            gap: 8px;
        }
        input {
            flex-grow: 1;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: #fafafa;
            color: #333;
            font-size: 16px; 
        }
        button {
            padding: 8px 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
            white-space: nowrap;
            font-size: 0.9rem;
            font-weight: bold;
        }
        button:hover {
            background-color: #45a049;
        }
        button.copied {
            background-color: #2196F3;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>フレンドコード</h2>
    
    <div id="friend-list"></div>

</div>

<script>
    // ==========================================
    // ▼▼▼ 編集エリア：ここを書き換えてください ▼▼▼
    // ==========================================
    const friendsData = [
{ name: "dabadaba372", code: "316-932-886-854" },
{ name: "がうー", code: "797-699-706-191" },
{ name: "アルベルト", code: "192-231-883-882" },
{ name: "ジョセフィンrs", code: "578-687-330-801" },
{ name: "ジョー", code: "368-324-665-859" },
{ name: "ロマンシングナギ", code: "728-247-924-882" },
{ name: "リン", code: "324-686-243-432" },
{ name: "Fenrir", code: "088-403-715-224" },
{ name: "ウッチー", code: "623-566-943-882" },
{ name: "ノクタン", code: "501-295-587-672" },
{ name: "Ray Souther(ばっしー☆ばし)", code: "137-034-510-543" },
{ name: "T.T.5.5", code: "261-238-909-247" },
{ name: "たっちん", code: "490-756-130-746" },
{ name: "じゃがー", code: "351-697-701-325" },
{ name: "うらごえ23", code: "554-623-836-159" },
{ name: "392", code: "495-067-775-649" },
{ name: "ケイプニ", code: "921-896-274-939" },
{ name: "ぽっちょん", code: "567-192-941-368" },
{ name: "ワシちゃん", code: "522-900-997-347" },
{ name: "カツどん", code: "027-580-759-268" },
{ name: "すけRS", code: "035-555-123-615" },
{ name: "ファンキー延長", code: "640-494-122-696" },
{ name: "あちょ", code: "367-718-372-688" },
{ name: "イニシャルA", code: "010-314-000-660" }
    ];
    // ==========================================
    // ▲▲▲ 編集エリア：ここまで ▲▲▲
    // ==========================================

    // 画面にリストを描画する処理
    const listContainer = document.getElementById('friend-list');
    let htmlContent = '';

    friendsData.forEach((friend, index) => {
        const inputId = `code_${index}`;
        htmlContent += `
        <div class="friend-card">
            <span class="friend-name">${friend.name}</span>
            <div class="copy-group">
                <input type="text" id="${inputId}" value="${friend.code}" readonly>
                <button onclick="copyCode(this, '${inputId}')">コピー</button>
            </div>
        </div>
        `;
    });

    listContainer.innerHTML = htmlContent;

    // コピー機能の処理
    function copyCode(button, inputId) {
        const codeInput = document.getElementById(inputId);
        navigator.clipboard.writeText(codeInput.value).then(() => {
            const originalText = button.innerText;
            button.innerText = 'コピー完了!';
            button.classList.add('copied');
            
            setTimeout(() => {
                button.innerText = originalText;
                button.classList.remove('copied');
            }, 2000);
        }).catch(err => {
            console.error('コピーに失敗しました', err);
            alert('コピーに失敗しました。');
        });
    }
</script>

</body>
</html>
