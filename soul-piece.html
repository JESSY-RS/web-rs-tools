<!DOCTYPE html>
<html lang="ja">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicon-soul.ico">
    <link rel="apple-touch-icon" href="apple-touch-icon-soul.png">
    <link rel="icon" type="image/png" href="web-app-manifest-192x192-soul.png">
    <title>ソウルピース必要数確認</title>
    <style>
        /* 全体のベース設定 */
        body {
            font-family: sans-serif;
            background-color: #2A2A2A;
            color: white;
            margin: 0;
            padding: 20px;
            user-select: none;
        }
        h1 {
            font-size: 1.8em;
            color: white;
            margin: 0 0 0 0;
        }
        h2 {
            font-size: 1.4em;
            color: #50b4f0; /* 元の色に戻す */
            margin-bottom: 15px;
            border-bottom: 1px solid #555;
            padding-bottom: 5px;
        }
        .header-section {
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #555;
        }
        
        /* 入力方式の選択ラジオボタン */
        .input-mode-selector {
            margin-bottom: 15px;
            font-size: 1.1em;
        }
        .input-mode-selector label {
            margin-right: 20px;
            cursor: pointer;
            color: #ddd;
        }

        /* 計算エリア */
        .calculator {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
            margin-bottom: 20px;
            background-color: #333;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #555;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .calc-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .calc-item label {
            font-weight: bold;
            color: #ccc;
            font-size: 1.1em;
        }
        
        /* 入力欄とプルダウンの共通設定 */
        input[type="number"], select {
            background-color: #222;
            color: white;
            border: 1px solid #666;
            padding: 8px;
            border-radius: 4px;
            font-size: 18px;
            width: 140px;
            box-sizing: border-box;
            font-family: sans-serif;
            font-weight: bold;
        }
        input[type="number"] {
            text-align: right;
            letter-spacing: 2px;
        }
        select {
            text-align: left;
            letter-spacing: normal;
        }
        input[type="number"]:focus, select:focus {
            outline: none;
            border-color: #50b4f0; /* 元の色に戻す */
        }
        
        .result {
            font-size: 1.6em;
            font-weight: bold;
            color: gold;
            margin-left: auto;
            padding-left: 20px;
            border-left: 2px dashed #666;
        }

        /* 汎用ボタン */
        button {
            background-color: #444;
            color: white;
            border: 1px solid #666;
            padding: 8px 15px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s, border-color 0.2s;
        }
        button:hover {
            background-color: #555;
        }
        
        /* レイアウト最適化ボタンの個別デザイン */
        #toggle-layout {
            background-color: #ff4500;
            color: white;
            border: 1px solid #ff4500;
        }
        #toggle-layout:hover {
            background-color: #cc3700;
            border-color: #cc3700;
        }
        #toggle-layout.active {
            background-color: #9b59b6;
            color: white;
            border-color: #9b59b6;
            font-weight: normal; 
        }
        #toggle-layout.active:hover {
            background-color: #8e44ad;
            border-color: #8e44ad;
        }

        /* クロスマトリックス（早見表） */
        .matrix-table-wrapper {
            overflow-x: auto;
            margin-bottom: 30px;
            background-color: #2A2A2A;
            border-radius: 6px;
            padding: 5px;
            max-width: 900px; 
        }
        .matrix-table {
            width: 100%;
            border-collapse: collapse;
            font-size: clamp(10px, 1.8vw, 15px);
            table-layout: fixed; 
        }
        .matrix-table th, .matrix-table td {
            border: 1px solid #ccc;
            padding: 6px 4px;
            text-align: right;
            white-space: nowrap;
            transition: background-color 0.2s;
        }
        .matrix-table th {
            background-color: #2a3a4a; 
            text-align: center;
            font-weight: bold;
            color: #e0e0e0;
        }
        .matrix-table th.corner-cell {
            background-color: #4a3f5a;
            color: #e0e0e0;
        }
        .matrix-table td.header-col {
            background-color: #394a34;
            text-align: center;
            font-weight: bold;
            color: #e0e0e0;
        }
        .matrix-table td.empty-cell {
            background-color: #2A2A2A;
        }
        
        /* 十字ハイライト用 (見出しのみに適用) */
        .matrix-table th.crosshair {
            background-color: #3b5066; 
        }
        .matrix-table td.header-col.crosshair {
            background-color: #4b6145; 
        }

        /* 交差セル（ハイライト） */
        .matrix-table td.highlight {
            background-color: #C99004 !important;
            color: #fff;
            font-weight: bold !important;
            box-shadow: none;
        }

        /* 一覧表の操作エリア */
        .table-controls {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* テーブルのコンテナ */
        .tables-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: flex-start;
        }
        .tables-container.multi-column {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            align-items: start;
            width: 100%;
        }

        /* 一覧表テーブルのデザイン */
        .table-wrapper {
            background-color: #333;
            border-radius: 6px; 
            overflow: hidden;
            border: 1px solid #666;
            scroll-margin-top: 20px;
            width: 100%;
            max-width: 360px; /* 400px から 360px に変更 */
        }
        .table-header {
            background-color: #222;
            padding: 8px 10px;
            border-bottom: 1px solid #666;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .table-title {
            color: #50b4f0; /* 元の色に戻す */
            font-weight: bold;
            font-size: 1.1em;
        }
        .table-nav {
            display: flex;
            gap: 6px;
        }
        .table-nav button {
            padding: 3px 8px; 
            font-size: 12px;
            background-color: #444;
            border: 1px solid #666;
        }
        .table-nav button:hover { background-color: #555; }
        .table-nav button:disabled {
            opacity: 0.3;
            cursor: default;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 16px;
        }
        th, td {
            border: 1px solid #666;
            padding: 8px 10px;
            text-align: right;
        }
        .list-table th {
            background-color: #4a3f5a; 
            text-align: center;
            font-weight: normal;
            color: #ccc;
        }
        
        /* 一覧表の各列の配色設定 */
        .list-table td.col-lv {
            text-align: center;
            font-weight: normal;
            background-color: #2a2a2a;
            color: white;
        }
        .list-table td.col-req {
            color: white;
            font-weight: normal;
        }
        .list-table td.col-tot {
            background-color: #2a2a2a;
            color: white;
        }

        #app-content {
            display: none;
        }

        /* フッターのスタイル */
        footer {
          border-top: 1px solid #eee;
          padding-top: 10px;
          margin-top: 20px;
        }

        /* リンクのスタイル */
        a:link {
          color: #1D9BF0;
          text-decoration: underline;
        }

        a:visited {
          color: #7755FF;
          text-decoration: underline;
        }

        a:hover {
          color: #0CFF57;
        }

        a:active {
          color: #FF0000;
          text-decoration: underline;
        }

        .bottom {
            margin-top: 20px;
            font-size: 16pt;
            line-height: 2;
        }
    </style>
</head>
<body>

    <div class="header-section" id="header-section">
        <h1>ソウルピース必要数確認</h1>
    </div>

    <div id="app-content">
        <h2>早見表</h2>
        
        <div class="input-mode-selector">
            <label><input type="radio" name="input-mode" id="mode-dropdown" checked> プルダウンで選択</label>
            <label><input type="radio" name="input-mode" id="mode-manual"> 任意の値を入力</label>
        </div>

        <div class="calculator">
            <div class="calc-item" id="dropdown-inputs">
                <label for="current-lv-select">現在 Lv</label>
                <select id="current-lv-select"></select>
                
                <label for="target-lv-select">目標 Lv</label>
                <select id="target-lv-select"></select>
            </div>

            <div class="calc-item" id="manual-inputs" style="display: none;">
                <label for="current-lv-input">現在 Lv</label>
                <input type="number" id="current-lv-input" placeholder="例: 100">
                
                <label for="target-lv-input">目標 Lv</label>
                <input type="number" id="target-lv-input" placeholder="例: 150">
            </div>
            
            <div class="calc-item result" id="calc-result">
                必要数: -
            </div>
        </div>

        <div class="matrix-table-wrapper" id="matrix-table-container">
            </div>

        <h2>一覧表</h2>
        <div class="table-controls">
            <button id="toggle-layout">モニター幅に合わせて列数を最適化</button>
            <span style="font-size: 0.9em; color: #aaa;">現在: <span id="layout-status">1列表示</span></span>
        </div>
        <div id="tables-container" class="tables-container">
            </div>
    </div>

  <footer>
    ※使用は自己責任にて。<br>
    ※列数を最適化はモニター幅が十分にない場合は切り替わりません。<br>
    <br>
    <a href="index.html">INDEXへ戻る</a><br>
  </footer>

    <script>
        let csvData = [];
        const csvFileName = 'data/soul-piece.csv';

        // 状態保存用のキー
        const LAYOUT_STORAGE_KEY = 'soulPieceLayout_isMulti';
        let isMultiColumn = localStorage.getItem(LAYOUT_STORAGE_KEY) === 'true';

        document.addEventListener('focusin', (e) => {
            if (e.target.type === 'number') {
                e.target.select();
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            fetch(csvFileName)
                .then(response => {
                    if (!response.ok) throw new Error('File not found');
                    return response.text();
                })
                .then(text => {
                    parseCSV(text);
                    if (csvData.length > 0) {
                        document.getElementById('app-content').style.display = 'block';
                        initializeUI();
                    }
                })
                .catch(error => {
                    console.log('CSV読み込みに失敗しました:', error);
                });
        });

        function parseCSV(text) {
            csvData = [];
            const lines = text.trim().split(/\r?\n/);
            for (let i = 1; i < lines.length; i++) {
                let line = lines[i];
                let parts = [];
                let inQuotes = false;
                let currentPart = '';
                for (let j = 0; j < line.length; j++) {
                    let char = line[j];
                    if (char === '"') inQuotes = !inQuotes;
                    else if (char === ',' && !inQuotes) {
                        parts.push(currentPart);
                        currentPart = '';
                    } else currentPart += char;
                }
                parts.push(currentPart);
                if (parts.length >= 4) {
                    csvData.push({
                        curLv: parseInt(parts[0], 10),
                        nextLv: parseInt(parts[1], 10),
                        req: parseInt(parts[2].replace(/,/g, ''), 10),
                        total: parseInt(parts[3].replace(/,/g, ''), 10)
                    });
                }
            }
        }

        function initializeUI() {
            populateDropdowns();
            generateMatrixTable();
            generateTables();
            updateCalculation();
            applyLayoutState(); // 初回レイアウト状態の反映
        }

        const radioDropdown = document.getElementById('mode-dropdown');
        const radioManual = document.getElementById('mode-manual');
        const dropdownInputs = document.getElementById('dropdown-inputs');
        const manualInputs = document.getElementById('manual-inputs');

        function switchInputMode() {
            if (radioDropdown.checked) {
                dropdownInputs.style.display = 'flex';
                manualInputs.style.display = 'none';
            } else {
                dropdownInputs.style.display = 'none';
                manualInputs.style.display = 'flex';
            }
            updateCalculation();
        }

        radioDropdown.addEventListener('change', switchInputMode);
        radioManual.addEventListener('change', switchInputMode);

        const milestones = [100, 150, 200, 300, 400, 500, 600, 700, 800, 900, 999];
        
        function populateDropdowns() {
            const curSel = document.getElementById('current-lv-select');
            const tarSel = document.getElementById('target-lv-select');
            
            curSel.innerHTML = '<option value="" disabled selected></option>'; 
            tarSel.innerHTML = '<option value="" disabled selected></option>';
            
            milestones.forEach(lv => {
                if (lv !== 999) curSel.add(new Option(lv, lv));
                if (lv !== 100) tarSel.add(new Option(lv, lv));
            });
        }

        function getAccumulatedTotal(lv) {
            const minLv = csvData[0].curLv;
            if (lv <= minLv) return 0;
            const targetData = csvData.find(d => d.nextLv === lv);
            return targetData ? targetData.total : 0;
        }

        function highlightMatrixCell(curLv, tarLv) {
            document.querySelectorAll('.matrix-table .highlight').forEach(el => el.classList.remove('highlight'));
            document.querySelectorAll('.matrix-table .crosshair').forEach(el => el.classList.remove('crosshair'));
            
            if (isNaN(curLv) || isNaN(tarLv)) return;

            const rowHeader = document.querySelector(`.matrix-table td.header-col[data-row="${curLv}"]`);
            if (rowHeader) rowHeader.classList.add('crosshair');
            
            const colHeader = document.querySelector(`.matrix-table th[data-col="${tarLv}"]`);
            if (colHeader) colHeader.classList.add('crosshair');

            const targetCell = document.getElementById(`matrix-cell-${curLv}-${tarLv}`);
            if (targetCell) {
                targetCell.classList.add('highlight');
            }
        }

        function updateCalculation() {
            const resultDiv = document.getElementById('calc-result');
            let curLv, tarLv;
            
            if (radioDropdown.checked) {
                curLv = parseInt(document.getElementById('current-lv-select').value, 10);
                tarLv = parseInt(document.getElementById('target-lv-select').value, 10);
            } else {
                curLv = parseInt(document.getElementById('current-lv-input').value, 10);
                tarLv = parseInt(document.getElementById('target-lv-input').value, 10);
            }
            
            highlightMatrixCell(curLv, tarLv);
            
            if (isNaN(curLv) || isNaN(tarLv)) {
                resultDiv.textContent = '必要数: -';
                resultDiv.style.fontSize = "1.6em"; 
                resultDiv.style.color = "gold";
                return;
            }

            if (curLv >= tarLv) {
                resultDiv.textContent = '必要数: 0 (現在Lv≧目標Lv)';
                resultDiv.style.fontSize = "1.6em";
                resultDiv.style.color = "red";
                return;
            }

            const minLv = csvData[0].curLv;
            const maxLv = csvData[csvData.length - 1].nextLv;
            
            if (curLv < minLv || tarLv > maxLv) {
                resultDiv.textContent = `エラー: Lv${minLv}～${maxLv}の範囲で入力してください`;
                resultDiv.style.fontSize = "1.1em"; 
                resultDiv.style.color = "red";
                return;
            }
            
            resultDiv.style.fontSize = "1.6em";
            resultDiv.style.color = "gold"; 
            const requiredAmount = getAccumulatedTotal(tarLv) - getAccumulatedTotal(curLv);
            resultDiv.textContent = `必要数: ${requiredAmount.toLocaleString()}`;
        }

        document.getElementById('current-lv-select').addEventListener('change', updateCalculation);
        document.getElementById('target-lv-select').addEventListener('change', updateCalculation);
        document.getElementById('current-lv-input').addEventListener('input', updateCalculation);
        document.getElementById('target-lv-input').addEventListener('input', updateCalculation);

        function generateMatrixTable() {
            const rows = [100, 150, 200, 300, 400, 500, 600, 700, 800, 900];
            const cols = [150, 200, 300, 400, 500, 600, 700, 800, 900, 999];
            
            let html = '<table class="matrix-table"><thead><tr><th class="corner-cell">魂Lv</th>';
            cols.forEach(c => html += `<th data-col="${c}">${c}</th>`);
            html += '</tr></thead><tbody>';
            
            rows.forEach(r => {
                html += `<tr><td class="header-col" data-row="${r}">${r}</td>`;
                cols.forEach(c => {
                    if (r >= c) {
                        html += `<td class="empty-cell"></td>`;
                    } else {
                        const req = getAccumulatedTotal(c) - getAccumulatedTotal(r);
                        html += `<td id="matrix-cell-${r}-${c}" data-row="${r}" data-col="${c}">${req.toLocaleString()}</td>`;
                    }
                });
                html += '</tr>';
            });
            html += '</tbody></table>';
            document.getElementById('matrix-table-container').innerHTML = html;
        }

        function generateTables() {
            const container = document.getElementById('tables-container');
            container.innerHTML = '';
            
            // 次Lv基準でのグループ分け
            let currentGroup = [];
            let startHundreds = Math.floor(csvData[0].nextLv / 100);
            const tableGroups = [];
            
            csvData.forEach(d => {
                const hundreds = Math.floor(d.nextLv / 100);
                if (hundreds !== startHundreds && currentGroup.length > 0) {
                    tableGroups.push([...currentGroup]);
                    currentGroup = [];
                    startHundreds = hundreds;
                }
                currentGroup.push(d);
            });
            if (currentGroup.length > 0) tableGroups.push([...currentGroup]);
            
            let wrapperHtml = '';
            const totalGroups = tableGroups.length;

            let colorIndex = -1;
            let lastReq = -1;
            const bgColors = [
                '#2a3a4a', // 青系
                '#0b4459', // 水色系 
                '#394a34', // 緑系
                '#5e5600', // 黄色系 
                '#6b4a37', // オレンジ系
                '#5c3c3c'  // 赤系
            ];

            tableGroups.forEach((group, index) => {
                const startGroupHundreds = Math.floor(group[0].nextLv / 100);
                const titleStart = startGroupHundreds * 100;
                const titleEnd = titleStart + 99;

                const prevDisabled = index === 0 ? 'disabled' : '';
                const nextDisabled = index === totalGroups - 1 ? 'disabled' : '';
                
                wrapperHtml += `<div class="table-wrapper" id="table-group-${index}">
                    <div class="table-header">
                        <div class="table-title">Lv ${titleStart} ～ ${titleEnd}</div>
                        <div class="table-nav">
                            <button onclick="scrollToGroup(${index - 1})" ${prevDisabled}>▲</button>
                            <button onclick="scrollToGroup(${index + 1})" ${nextDisabled}>▼</button>
                        </div>
                    </div>
                    <table class="list-table">
                        <thead>
                            <tr><th>現Lv</th><th>次Lv</th><th>必要数</th><th>累計数</th></tr>
                        </thead>
                        <tbody>`;
                
                // 次Lvが100番台(Lv100～199)の時、先頭にダミー行を挿入
                if (titleStart === 100) {
                    wrapperHtml += `<tr style="background-color: #444; color: #fff;">
                        <td class="col-lv" style="background-color: transparent; color: inherit;"></td>
                        <td class="col-lv" style="background-color: transparent; color: inherit;">100</td>
                        <td class="col-req" style="background-color: transparent; color: inherit;">0</td>
                        <td class="col-tot" style="background-color: transparent; color: inherit;">0</td>
                    </tr>`;
                }

                group.forEach(d => {
                    if (d.req !== lastReq) {
                        colorIndex = (colorIndex + 1) % bgColors.length;
                        lastReq = d.req;
                    }
                    const currentBgColor = bgColors[colorIndex];

                    wrapperHtml += `<tr>
                        <td class="col-lv">${d.curLv}</td>
                        <td class="col-lv">${d.nextLv}</td>
                        <td class="col-req" style="background-color: ${currentBgColor};">${d.req.toLocaleString()}</td>
                        <td class="col-tot">${d.total.toLocaleString()}</td>
                    </tr>`;
                });
                wrapperHtml += `</tbody></table></div>`;
            });
            container.innerHTML = wrapperHtml;
        }

        window.scrollToGroup = function(index) {
            const target = document.getElementById(`table-group-${index}`);
            if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        };

        // レイアウト状態を反映する関数
        function applyLayoutState() {
            const container = document.getElementById('tables-container');
            const toggleBtn = document.getElementById('toggle-layout');
            const layoutStatus = document.getElementById('layout-status');

            if (isMultiColumn) {
                container.classList.add('multi-column');
                toggleBtn.classList.add('active');
                toggleBtn.textContent = '1列表示に戻す';
                layoutStatus.textContent = '自動最適化';
            } else {
                container.classList.remove('multi-column');
                toggleBtn.classList.remove('active');
                toggleBtn.textContent = 'モニター幅に合わせて列数を最適化';
                layoutStatus.textContent = '1列表示';
            }
        }

        const toggleBtn = document.getElementById('toggle-layout');
        toggleBtn.addEventListener('click', () => {
            isMultiColumn = !isMultiColumn;
            localStorage.setItem(LAYOUT_STORAGE_KEY, isMultiColumn); // 状態を保存
            applyLayoutState();
        });
    </script>
</body>
</html>
